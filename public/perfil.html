<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgroSense | Perfil do Usuário</title>
  <link rel="stylesheet" href="./css/perfil.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .btn-enviar {
      background-color: #28631d;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-family: "Poppins", sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-top: 8px;
    }

    .btn-enviar:hover {
      background-color: #1f4f15;
    }

    .btn-enviar:active {
      transform: scale(0.98);
    }

    .btn-enviar:disabled {
      background-color: #aaa;
      cursor: not-allowed;
      transform: none;
    }
  </style>
</head>

<body>

  <aside class="sidebar">
    <div class="logo-sidebar">
      <h2>AgroSense</h2>
      <nav class="menu-itens">
        <a href="perfil.html" class="active">Perfil</a>
        <a href="chart_dashboard.html" >Dashboard</a>
        <a href="manualInstalacao.html">Manuais de Instalação </a>
        <a href="fale_conosco.html" >Fale Conosco</a>
        <a href="../public/dashboard/FAQ.html">Perguntas Frequentes</a>
      </nav>
      <div class="sidebar-footer">
        <a href="login.html" class="btn-sair">Sair</a>
      </div>
    </div>
  </aside>
    <div class="alerta_erro">
    <div class="card_erro" id="cardErro">
      <span id="mensagem_erro"></span>
    </div>

  <header>
    <nav class="barradashboard">
    <span>Olá, <span id="b_usuario">! Bem-vindo a Sua Área Exclusiva</span>
    </nav>
  </header>

  <div class="main-content">
    <div class="page-title">Perfil do Usuário</div>

    <div class="profile-grid">

      <div class="card-avatar">
        <div class="avatar-circle">🍓</div>
        <div class="avatar-nome"><span id="b_usuario"></span></div>
        <div class="avatar-cargo">Cliente</div>

        <div class="avatar-divider"></div>

        <div class="info-item">
          <span class="info-label">Membro desde</span>
          <span class="info-value" id="b_data"></span>
        </div>
        <div class="info-item">
          <span class="info-label">E-mail</span>
          <span class="info-value" id=b_email></span>
        </div>
        <div class="info-item">
          <span class="info-label">CPF</span>
          <span class="info-value" id=b_cpf></span>
        </div>
        <div class="info-item">
          <span class="info-label">Telefone</span>
          <span class="info-value" id=b_telefone></span>
        </div>
      </div>

      <div class="card-empresa">
        <div class="card-titulo">
          Informações da Empresa / Produtor
        </div>
        <div class="empresa-grid">
          <div class="campo">
            <label>Nome da Empresa</label>
            <input id="input_nome_empresa" type="text" placeholder="Fazenda Boa Vista"/>
          </div>
          <div class="campo">
            <label>CNPJ</label>
            <input id="input_cnpj" type="text" placeholder="01.001.001/0001-01"/>
          </div>
          <div class="campo">
            <label>CEP</label>
            <input id="input_cep" type="text" placeholder="01001-000"/>
          </div>
          <div class="campo">
            <label>Complemento</label>
            <input id="input_complemento" type="text" placeholder="Descrição"/>
          </div>
        </div>
        <div style="grid-column: span 2;">
          <button class="btn-enviar" id="btn-enviar" onclick="enviar()">Enviar Dados</button>
        </div>
      </div>

      <div class="card-sensores">
        <div class="card-titulo">
         Sensores da Plantação
        </div>

        <div class="sensores-resumo">
          <div class="sensor-stat total">
            <span class="numero">5</span>
            <span class="descricao">Total</span>
          </div>
          <div class="sensor-stat ativos">
            <span class="numero">3</span>
            <span class="descricao">Ativos</span>
          </div>
          <div class="sensor-stat inativos">
            <span class="numero">2</span>
            <span class="descricao">Inativos</span>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
<script>
 function enviar() {
    var nomeEmpresaVar = input_nome_empresa.value;
    var cnpjVar = input_cnpj.value;
    var cepVar = input_cep.value;
    var complementoVar = input_complemento.value;

    // Verificando se há algum campo em branco
    if (
      nomeEmpresaVar == "" ||
      cnpjVar == "" ||
      cepVar == "" ||
      complementoVar == "" 
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

     fetch("/perfil/enviar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeEmpresaServer: nomeEmpresaVar,
        cnpjServer: cnpjVar,
        cepServer: cepVar,
        complementoServer: complementoVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Perfil atualizado com sucesso";

          limparFormulario();
        } else {
          throw "Houve um erro ao atualizar o perfil!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });

    return false;
  }


  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
